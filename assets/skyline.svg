<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 240" fill="#000" stroke="#000">
  <!-- ============ WASHINGTON, DC ============ -->
  <g>
    <!-- Lincoln Memorial -->
    <rect x="24" y="188" width="150" height="32"/>
    <rect x="34" y="150" width="130" height="40"/>
    <rect x="28" y="142" width="142" height="9"/>
    <!-- Washington Monument -->
    <rect x="206" y="58" width="17" height="162"/>
    <polygon points="206,58 223,58 214.5,40"/>
    <!-- Capitol -->
    <rect x="288" y="164" width="184" height="56"/>
    <rect x="360" y="128" width="40" height="40"/>
    <ellipse cx="380" cy="120" rx="24" ry="30"/>
    <rect x="377" y="86" width="6" height="16"/>
    <circle cx="380" cy="84" r="4.5"/>
  </g>

  <!-- ============ LONDON ============ -->
  <g>
    <!-- Big Ben -->
    <rect x="560" y="80" width="38" height="140"/>
    <polygon points="555,80 603,80 579,50"/>
    <!-- St Paul's -->
    <rect x="636" y="160" width="90" height="60"/>
    <path d="M647 160 a34 40 0 0 1 68 0 z"/>
    <rect x="675" y="112" width="12" height="16"/>
    <rect x="679" y="99" width="4" height="14"/>
    <rect x="675" y="103" width="12" height="4"/>
    <!-- The Shard -->
    <polygon points="748,220 790,220 771,54"/>
    <!-- London Eye -->
    <circle cx="885" cy="138" r="60" fill="none" stroke-width="3"/>
    <circle cx="885" cy="138" r="6"/>
    <g stroke-width="2">
      <line x1="885" y1="138" x2="885" y2="78"/>
      <line x1="885" y1="138" x2="885" y2="198"/>
      <line x1="885" y1="138" x2="825" y2="138"/>
      <line x1="885" y1="138" x2="945" y2="138"/>
      <line x1="885" y1="138" x2="842" y2="95"/>
      <line x1="885" y1="138" x2="928" y2="181"/>
      <line x1="885" y1="138" x2="842" y2="181"/>
      <line x1="885" y1="138" x2="928" y2="95"/>
    </g>
    <polygon points="855,220 885,138 862,220" stroke-width="0"/>
    <polygon points="915,220 885,138 908,220" stroke-width="0"/>
  </g>

  <!-- ============ FRANKFURT ============ -->
  <g>
    <!-- Europaturm-style tower with mast -->
    <rect x="1040" y="118" width="34" height="102"/>
    <rect x="1055" y="84" width="4" height="34"/>
    <circle cx="1057" cy="82" r="6"/>
    <!-- Messeturm (pyramid top) -->
    <rect x="1090" y="138" width="30" height="82"/>
    <polygon points="1088,138 1122,138 1105,102"/>
    <!-- Commerzbank Tower (spire) -->
    <rect x="1140" y="88" width="40" height="132"/>
    <rect x="1158" y="52" width="4" height="36"/>
    <!-- Main Tower -->
    <rect x="1200" y="128" width="36" height="92"/>
    <rect x="1206" y="118" width="24" height="10"/>
    <rect x="1216" y="94" width="3" height="24"/>
    <!-- Deutsche Bank twin towers -->
    <rect x="1260" y="108" width="26" height="112"/>
    <rect x="1292" y="108" width="26" height="112"/>
    <!-- lower towers -->
    <rect x="1332" y="158" width="30" height="62"/>
    <rect x="1370" y="138" width="26" height="82"/>
    <rect x="1406" y="170" width="28" height="50"/>
  </g>

  <!-- ground line -->
  <rect x="0" y="219" width="1600" height="2"/>
</svg>
